version: "3.8"

services:

    yacht:
        image: selfhostedpro/yacht:latest
        container_name: yacht
        volumes:
            - ${CONFIG}/yacht:/config
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - media_network
        ports:
            - 8000:8000
        restart: unless-stopped


    jellyfin:
        image: jellyfin/jellyfin:latest
        container_name: jellyfin
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/jellyfin:/config
            - ${DATA}/media:/media
        networks:
            - media_network
        ports:
            - 8090:8096
        restart: unless-stopped


    qbittorrent:
        image: lscr.io/linuxserver/qbittorrent:latest
        container_name: qbittorrent
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
            - WEBUI_PORT=8080
        volumes:
            - ${CONFIG}/qbittorrent:/config
            - ${DATA}:/data
        ports:
            - 8080:8080
        networks:
            - media_network
        restart: unless-stopped


    prowlarr:
        image: lscr.io/linuxserver/prowlarr:latest
        container_name: prowlarr
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/prowlarr:/config
        networks:
            - media_network
        ports:
            - 7000:9696
        restart: unless-stopped


    radarr:
        image: lscr.io/linuxserver/radarr:latest
        container_name: radarr
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/radarr:/config
            - ${DATA}:/data
        networks:
            - media_network
        ports:
            - 7001:7878
        restart: unless-stopped


    sonarr:
        image: lscr.io/linuxserver/sonarr:latest
        container_name: sonarr
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/sonarr:/config
            - ${DATA}:/data
        networks:
            - media_network
        ports:
            - 7002:8989
        restart: unless-stopped


    lidarr:
        image: lscr.io/linuxserver/lidarr:latest
        container_name: lidarr
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/lidarr:/config
            - ${DATA}:/data
        networks:
            - media_network
        ports:
            - 7003:8686
        restart: unless-stopped


    sportarr:
        image: sportarr/sportarr:latest
        container_name: sportarr
        environment:
            - PUID=${PUID}
            - PGID=${PGID}
            - TZ=${TZ}
        volumes:
            - ${CONFIG}/sportarr:/config
            - ${DATA}:/data
        networks:
            - media_network
        ports:
            - 7004:1867
        restart: unless-stopped


networks:
    - media_network
